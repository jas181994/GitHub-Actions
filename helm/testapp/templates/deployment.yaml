apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginxde
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: jasmeet181994/testapp:{{ .Values.image.tag   }}
        ports:
        - containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: mysvc
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80          # Port exposed inside the cluster
      targetPort: 3000 # Port the container is listening on
        #      nodePort: 30007  
